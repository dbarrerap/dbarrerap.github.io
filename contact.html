---
layout: page
title: Contacto
permalink: /contact/
---
<div class="row">
    <div class="col-md-8 offset-md-2">
        <form action="https://formspree.io/xgeljnkl" method="post">
            <div class="form-group">
                <label for="form_nombre">Nombre</label>
                <input type="text" name="name" id="form_nombre" class="form-control">
            </div>
            <div class="form-group">
                <label for="form_email">Email</label>
                <input type="email" name="_replyto" id="form_email" class="form-control">
            </div>
            <div class="form-group">
                <label for="form_message">Mensaje</label>
                <textarea name="message" id="form_message" rows="3" class="form-control"></textarea>
            </div>
            <button type="submit" class="btn bg-midnight-navy text-white">Enviar</button>
        </form>
    </div>
</div>
